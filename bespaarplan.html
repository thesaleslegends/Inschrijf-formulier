<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>⚡ Bespaarplan</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 30px;
}

h1 { text-align: center; }

.box {
  max-width: 700px;
  margin: auto;
  background: #fff3cd;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>⚡ Bespaarplan</h1>

<div class="box">

<h3>Klant intake</h3>

<label>Stroomverbruik (kWh)</label>
<input type="number" id="stroom" value="3000">

<label>Prijs stroom (€ / kWh)</label>
<input type="number" id="prijsStroom" value="0.30" step="0.01">

<label>Teruglever kosten (€ / kWh)</label>
<input type="number" id="teruglever" value="0.07" step="0.01">

<h3>Interesse</h3>

<label><input type="checkbox" name="product" value="zonnepanelen"> Zonnepanelen</label>
<label><input type="checkbox" name="product" value="batterij"> Batterij</label>

<!-- 🔆 ZONNEPANELEN -->
<div id="zonnepanelenOpties" style="display:none;">
  <h4>Zonnepanelen</h4>

  <label>Thuisverbruik</label>
  <select id="thuis">
    <option value="0.7">Vaak thuis (70%)</option>
    <option value="0.5">Gemiddeld (50%)</option>
    <option value="0.3">Weinig (30%)</option>
  </select>

  <label>Aantal panelen</label>
  <input type="number" id="panelen" value="10">

  <label>Dak ligging</label>
  <select id="dak">
    <option value="1">Zuid</option>
    <option value="0.9">Oost/West</option>
    <option value="0.75">Noord</option>
  </select>
</div>

<!-- 🔋 BATTERIJ -->
<div id="batterijOpties" style="display:none;">
  <h4>Batterij</h4>

  <label>Kies batterij</label>
  <select id="batterijSelect">

    <option value="">Kies batterij</option>

    <optgroup label="Hoymiles">
      <option value="8|6490">5kW + 8 kWh → €6490</option>
      <option value="8|6665">8kW + 8 kWh → €6665</option>
      <option value="16|8665">10kW + 16 kWh → €8665</option>
      <option value="24|11760">10kW + 24 kWh → €11760</option>
      <option value="32|13855">10kW + 32 kWh → €13855</option>
      <option value="40|15950">10kW + 40 kWh → €15950</option>
      <option value="48|18720">10kW + 48 kWh → €18720</option>
      <option value="56|20810">10kW + 56 kWh → €20810</option>
    </optgroup>

    <optgroup label="Alpha ESS">
      <option value="7.6|7170">7.6 kWh → €7170</option>
      <option value="11.4|8370">11.4 kWh → €8370</option>
      <option value="15.2|9910">15.2 kWh → €9910</option>
      <option value="18.6|9400">18.6 kWh → €9400</option>
      <option value="27.9|11900">27.9 kWh → €11900</option>
      <option value="37.2|14380">37.2 kWh → €14380</option>
      <option value="46.5|16540">46.5 kWh → €16540</option>
      <option value="55.8|18700">55.8 kWh → €18700</option>
      <option value="74.4|26800">74.4 kWh → €26800</option>
      <option value="93|31110">93 kWh → €31110</option>
      <option value="111.6|35560">111.6 kWh → €35560</option>
    </optgroup>

    <optgroup label="Bluesun">
      <option value="16|7500">16 kWh → €7500</option>
      <option value="32|10440">32 kWh → €10440</option>
      <option value="48|12840">48 kWh → €12840</option>
      <option value="64|16240">64 kWh → €16240</option>
      <option value="16.28|8340">16.28 kWh → €8340</option>
      <option value="21.72|9410">21.72 kWh → €9410</option>
      <option value="27.15|10220">27.15 kWh → €10220</option>
      <option value="32.58|11300">32.58 kWh → €11300</option>
      <option value="38.01|12360">38.01 kWh → €12360</option>
      <option value="43.44|13440">43.44 kWh → €13440</option>
      <option value="59.72|16520">59.72 kWh → €16520</option>
      <option value="81.44|21270">81.44 kWh → €21270</option>
    </optgroup>

  </select>
</div>

<button onclick="bereken()">Bereken besparing</button>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>

// prijzen zonnepanelen (jouw lijst kun je uitbreiden)
const prijzen = {
  10:4650, 11:5115, 12:5565, 13:5850, 14:6300
};

// show/hide
document.querySelectorAll('input[name="product"]').forEach(el=>{
  el.addEventListener("change", () => {

    const zonne = document.querySelector('[value="zonnepanelen"]').checked;
    const batterij = document.querySelector('[value="batterij"]').checked;

    document.getElementById("zonnepanelenOpties").style.display = zonne ? "block" : "none";
    document.getElementById("batterijOpties").style.display = batterij ? "block" : "none";
  });
});

function bereken(){

  const prijsStroom = parseFloat(document.getElementById('prijsStroom').value);
  const teruglever = parseFloat(document.getElementById('teruglever').value);

  let totaleBesparing = 0;
  let totaleInvestering = 0;
  let advies = "";

  const zonne = document.querySelector('[value="zonnepanelen"]').checked;
  const batterij = document.querySelector('[value="batterij"]').checked;

  // 🔆 zonnepanelen
  if(zonne){

    const panelen = parseFloat(document.getElementById('panelen').value);
    const thuis = parseFloat(document.getElementById('thuis').value);
    const dak = parseFloat(document.getElementById('dak').value);

    const opbrengst = panelen * 465 * 0.85 * dak;
    const eigen = opbrengst * thuis;
    const terug = opbrengst - eigen;

    const besparing = (eigen * prijsStroom) - (terug * teruglever);
    const prijs = prijzen[panelen] || panelen * 450;

    totaleBesparing += besparing;
    totaleInvestering += prijs;

    advies += `🔆 ${panelen} panelen → €${Math.round(besparing)} / jaar<br>`;
  }

  // 🔋 batterij
  if(batterij){

    const val = document.getElementById('batterijSelect').value;
    if(!val){
      alert("Kies batterij");
      return;
    }

    const [cap, prijsBat] = val.split("|").map(Number);

    const besparing = cap * 365 * 0.6 * (prijsStroom - teruglever);

    totaleBesparing += besparing;
    totaleInvestering += prijsBat;

    advies += `🔋 ${cap} kWh batterij → €${Math.round(besparing)} / jaar<br>`;
  }

  const tvt = totaleInvestering / totaleBesparing;

  document.getElementById("result").style.display = "block";

  document.getElementById("result").innerHTML = `
    <h3>📊 Resultaat</h3>

    ${advies}

    <hr>

    <b>Totale investering:</b> €${Math.round(totaleInvestering)}<br>
    <b>Totale besparing:</b> €${Math.round(totaleBesparing)} / jaar<br>
    <b>Terugverdientijd:</b> ${tvt.toFixed(1)} jaar
  `;
}

</script>

</body>
</html>
