<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Leads</title>

<script>
if(localStorage.getItem("ingelogd") !== "true") {
  window.location.href = "/login.html";
}
</script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseClient = createClient(
  "https://lgpydcsolgbqiuplvjsc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxncHlkY3NvbGdicWl1cGx2anNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDE0ODgsImV4cCI6MjA4OTUxNzQ4OH0.bmCbu6fjAixqCMwBbms2tAXHpzJOccz57_RrAKjovTQ"
);

let huidigeLead = null;

function safe(v) {
  return v ?? '-';
}

function statusKleur(status) {
  switch(status) {
    case 'bevestigd': return 'green';
    case 'voicemail': return 'orange';
    case 'geannuleerd': return 'red';
    default: return 'gray';
  }
}

async function loadLeads() {
  const { data, error } = await supabaseClient
    .from('afspraken')
    .select('*')
    .order('datum', { ascending: true });

  if (error) {
    console.error(error);
    alert('Supabase error');
    return;
  }

  const tbody = document.querySelector('#leadsTable tbody');
  tbody.innerHTML = '';

  data.forEach(lead => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${safe(lead.voornaam)} ${safe(lead.achternaam)}</td>
      <td>${safe(lead.datum)}</td>
      <td>${safe(lead.tijdslot)}</td>
      <td>${safe(lead.interesse)}</td>
      <td style="color:${statusKleur(lead.status)}">
        ${safe(lead.status)}
      </td>
    `;

    tr.onclick = () => openModal(lead);
    tbody.appendChild(tr);
  });
}

function openModal(lead) {
  huidigeLead = lead;

  document.getElementById('modal').style.display = 'flex';

  document.getElementById('naam').innerText =
    safe(lead.voornaam) + " " + safe(lead.achternaam);

  document.getElementById('datum').value = lead.datum || '';
  document.getElementById('tijd').value = lead.tijdslot || '';
  document.getElementById('status').value = lead.status || 'nieuw';

  document.getElementById('telefoon').innerText = safe(lead.telefoon);
  document.getElementById('email').innerText = safe(lead.email);

  document.getElementById('straat').innerText =
    safe(lead.straatnaam || lead.straat);

  document.getElementById('huisnummer').innerText = safe(lead.huisnummer);
  document.getElementById('postcode').innerText = safe(lead.postcode);

  document.getElementById('interesse').innerText = safe(lead.interesse);

  // 🔥 NIEUWE VELDEN
  document.getElementById('zelfgedaan').innerText = safe(lead.zelfgedaan);
  document.getElementById('advies').innerText = safe(lead.advies_gesprek);
  document.getElementById('partner').innerText = safe(lead.partner_aanwezig);

  document.getElementById('notities').innerText =
    safe(lead.notities || lead.opmerking);
}

window.closeModal = function() {
  document.getElementById('modal').style.display = 'none';
}

window.opslaan = async function() {
  const datum = document.getElementById('datum').value;
  const tijd = document.getElementById('tijd').value;
  const status = document.getElementById('status').value;

  const { error } = await supabaseClient
    .from('afspraken')
    .update({
      datum: datum,
      tijdslot: tijd,
      status: status
    })
    .eq('id', huidigeLead.id);

  if (error) {
    console.error(error);
    alert('Fout bij opslaan');
  } else {
    alert('Opgeslagen ✅');
    closeModal();
    loadLeads();
  }
}

window.addEventListener('DOMContentLoaded', loadLeads);
</script>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 30px;
}

h1 {
  text-align: center;
}

table {
  width: 100%;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  border-collapse: collapse;
}

th {
  background: #2c3e50;
  color: white;
  padding: 12px;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

tr:hover {
  background: #f1f1f1;
}

.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:420px;
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:10px;
  background:#2ecc71;
  color:white;
  border:none;
  border-radius:5px;
}

.close {
  float:right;
  cursor:pointer;
}
</style>

</head>

<body>

<h1>📋 Leads</h1>

<table id="leadsTable">
<thead>
<tr>
<th>Naam</th>
<th>Datum</th>
<th>Tijd</th>
<th>Interesse</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✖</span>

    <h3 id="naam"></h3>

    <label>Datum</label>
    <input type="date" id="datum">

    <label>Tijd</label>
    <input type="time" id="tijd">

    <label>Status</label>
    <select id="status">
      <option value="nieuw">Nieuw</option>
      <option value="bevestigd">Bevestigd</option>
      <option value="voicemail">Voicemail</option>
      <option value="geannuleerd">Geannuleerd</option>
    </select>

    <hr>

    <p><b>Telefoon:</b> <span id="telefoon"></span></p>
    <p><b>Email:</b> <span id="email"></span></p>
    <p><b>Straat:</b> <span id="straat"></span></p>
    <p><b>Huisnummer:</b> <span id="huisnummer"></span></p>
    <p><b>Postcode:</b> <span id="postcode"></span></p>

    <p><b>Interesse:</b> <span id="interesse"></span></p>

    <hr>

    <p><b>Zelf gedaan:</b><br><span id="zelfgedaan"></span></p>
    <p><b>Wat wil klant:</b><br><span id="advies"></span></p>
    <p><b>Partner aanwezig:</b> <span id="partner"></span></p>
    <p><b>Notities:</b><br><span id="notities"></span></p>

    <button onclick="opslaan()">💾 Opslaan</button>
  </div>
</div>

</body>
</html>
